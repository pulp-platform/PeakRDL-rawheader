version = 1

SPDX-PackageName = "PeakRDL-rawheader"
SPDX-PackageSupplier = "ETH Zurich and University of Bologna"
SPDX-PackageDownloadLocation = "https://github.com/pulp-platform/PeakRDL-rawheader"

# Documentation, license and project meta files.
[[annotations]]
path = [
    "LICENSE",
    "README.md",
    "CHANGELOG.md",
    "RELEASE.md",
    "CLAUDE.md",
    ".gitignore",
    ".python-version",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 ETH Zurich and University of Bologna"
SPDX-License-Identifier = "Apache-2.0"

# Lock file (generated by uv).
[[annotations]]
path = "uv.lock"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 ETH Zurich and University of Bologna"
SPDX-License-Identifier = "Apache-2.0"

# Mako templates: comment syntax differs per target language, so headers are
# tracked here rather than inline to avoid leaking into generated output.
[[annotations]]
path = "src/peakrdl_rawheader/templates/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 ETH Zurich and University of Bologna"
SPDX-License-Identifier = "Apache-2.0"

# Test fixtures (RDL inputs) and golden reference outputs.
[[annotations]]
path = [
    "tests/input/**",
    "tests/output/**",
    "tests/picobello.rdl",
    "tests/svh_pkg.sv",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 ETH Zurich and University of Bologna"
SPDX-License-Identifier = "Apache-2.0"
