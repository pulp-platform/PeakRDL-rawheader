name: lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  ########
  # Ruff #
  ########
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0

  #################
  # REUSE        #
  #################
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v6
